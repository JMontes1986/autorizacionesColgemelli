<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="5;url=https://sigagemelli.vercel.app/" />
  <title>SIGA Gemelli · Redirección</title>
  <style>
    :root {
      --bg: #080b10;
      --surface: #0f1420;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "DM Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.2), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.18), transparent 40%),
        var(--bg);
    }

    .card {
      width: min(720px, 100%);
      background: rgba(15, 20, 32, 0.95);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      letter-spacing: 0.08em;
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1.06rem;
    }

    .badge {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(99, 102, 241, 0.45);
      background: rgba(99, 102, 241, 0.12);
      color: #c7d2fe;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .cta {
      display: inline-block;
      margin-top: 26px;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Actualización de plataforma</div>
    <h1>SIGA GEMELLI</h1>
    <p>
      Esta versión de la aplicación ya no está disponible.<br />
      Te estamos redirigiendo a la nueva plataforma de SIGA.
    </p>
    <p>Si no ocurre automáticamente, haz clic en el botón:</p>
    <a class="cta" href="https://sigagemelli.vercel.app/">Ir a la nueva plataforma</a>
  </main>

  <script>
    setTimeout(() => {
      window.location.replace('https://sigagemelli.vercel.app/');
    }, 1800);
  </script>
</body>
</html>
